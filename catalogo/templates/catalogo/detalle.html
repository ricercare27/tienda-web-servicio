{% load static %}
<!DOCTYPE html>


<html lang="es">

<head>
    <link rel="stylesheet" href="{% static 'catalogo/styles.css' %}">
    <meta charset="UTF-8">
    <title>{{ producto.nombre }}</title>
</head>

<body>
    <h1>{{ producto.nombre }}</h1>
    <p>{{ producto.descripcion }}</p>
    <p>Precio: ${{ producto.precio }}</p>
    <p>Existencia: {{ producto.existencia }}</p>

    <a href="{% url 'lista_productos' %}">Volver al catálogo</a>
</body>

</html>

{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>
    <link rel="stylesheet" href="{% static 'catalogo/styles.css' %}">
    <meta charset="UTF-8">
    <title>Catálogo de productos</title>
    <style>
        body {
            font-family: Arial;
            margin: 40px;
        }

        table {
            border-collapse: collapse;
            width: 100%;
        }

        th,
        td {
            border: 1px solid #ccc;
            padding: 8px;
        }

        th {
            background-color: #f2f2f2;
        }
    </style>
</head>

<body>
    <h1>Catálogo de productos</h1>
    <table>
        <tr>
            <th>Nombre</th>
            <th>Descripción</th>
            <th>Precio</th>
            <th>Existencia</th>
        </tr>
        {% for producto in productos %}
        <tr>
            <td>
                <a href="/productos/{{ producto.id }}/">
                    {{ producto.nombre }}
                </a>
            </td>
            <td>{{ producto.descripcion }}</td>
            <td>${{ producto.precio }}</td>
            <td>{{ producto.existencia }}</td>
        </tr>
        {% endfor %}
    </table>
</body>

</html>
